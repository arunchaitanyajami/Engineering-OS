name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.4.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install better-sqlite3 native binding
        run: |
          pkg_dir=$(find node_modules/.pnpm -maxdepth 1 -type d -name 'better-sqlite3@*' | head -n 1)
          pnpm --dir "$pkg_dir/node_modules/better-sqlite3" run install

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test:unit

      - name: Integration tests
        run: pnpm test:integration

      - name: Build
        run: pnpm build

      - name: Package boundaries
        run: pnpm boundaries:check

      - name: Dependency consistency
        run: pnpm deps:check

      - name: Security audit
        run: pnpm security:check

      - name: End-to-end smoke test
        run: pnpm test:e2e
